<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Video Shadow</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      background: #0a0a0c;
      color: #e8e4dc;
      height: 100vh;
      overflow: hidden;
    }
    body {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .line {
      position: absolute;
      white-space: pre;
      z-index: 1;
      color: #e8e4dc;
      user-select: text;
      -webkit-user-select: text;
      direction: rtl;
      text-align: right;
    }

    video { display: none; }
    canvas { display: none; }


    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font: 300 24px/1 system-ui;
      color: rgba(255,255,255,0.3);
      z-index: 100;
      pointer-events: none;
    }
  </style>
  <script type="module" crossorigin src="/pretext/assets/index-Dv782QPW.js"></script>
</head>
<body>
  <div id="stage"></div>
  <video id="video" loop muted playsinline></video>
  <canvas id="sampling-canvas"></canvas>
  <div id="loading">loading...</div>
</body>
</html>
