<script>
  let currentWord = "WORD";
  const historyList = [currentWord];

  const wordInput = document.getElementById('wordInput');
  const currentWordDisplay = document.getElementById('currentWordDisplay');
  const message = document.getElementById('message');
  const wordList = document.getElementById('wordList');
  const submitButton = document.querySelector('button');

  // Allow 'Enter' key submission
  wordInput.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
      submitWord();
    }
  });

  function getLetterDifferences(word1, word2) {
    let diffCount = 0;
    for (let i = 0; i < 4; i++) {
      if (word1[i] !== word2[i]) {
        diffCount++;
      }
    }
    return diffCount;
  }

  async function submitWord() {
    const nextWord = wordInput.value.trim().toUpperCase();
    message.style.color = "#e74c3c"; // Default to error color

    if (nextWord.length !== 4) {
      message.textContent = "Word must be exactly 4 letters.";
      return;
    }

    if (nextWord === currentWord) {
      message.textContent = "You must change at least one letter!";
      return;
    }

    const differences = getLetterDifferences(currentWord, nextWord);
    if (differences !== 1) {
      message.textContent = `You changed ${differences} letters. Change exactly ONE letter!`;
      return;
    }

    // --- NEW: Asynchronous API Dictionary Check ---
    
    // Disable input while fetching to prevent spamming
    wordInput.disabled = true;
    submitButton.disabled = true;
    message.style.color = "#f39c12"; // Orange for loading state
    message.textContent = "Checking dictionary...";

    try {
      // Hit a free dictionary API to validate the word
      const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${nextWord}`);
      
      if (!response.ok) {
        // A 404 means the word wasn't found in their dictionary
        message.style.color = "#e74c3c";
        message.textContent = `"${nextWord}" is not a recognized English word!`;
        return;
      }
      
      // If we pass the check, the word exists. Update game state!
      message.style.color = "#27ae60"; 
      message.textContent = "Nice one!";
      currentWord = nextWord;
      historyList.push(currentWord);
      
      currentWordDisplay.textContent = currentWord;
      wordList.innerHTML = historyList.join(' &rarr; ');
      wordInput.value = '';

      const historyDiv = document.getElementById('history');
      historyDiv.scrollTop = historyDiv.scrollHeight;

    } catch (error) {
      message.style.color = "#e74c3c";
      message.textContent = "Network error while checking the dictionary.";
    } finally {
      // Re-enable inputs regardless of success or failure
      wordInput.disabled = false;
      submitButton.disabled = false;
      wordInput.focus();
    }
  }
</script>
