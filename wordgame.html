<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Ladder Game</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f4f4f9;
    margin: 0;
  }
  .game-container {
    background: white;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 450px;
    width: 100%;
  }
  h1 {
    color: #333;
    margin-top: 0;
  }
  .current-word {
    font-size: 3.5rem;
    font-weight: bold;
    letter-spacing: 0.5rem;
    color: #2c3e50;
    margin: 1.5rem 0;
    text-transform: uppercase;
  }
  input {
    font-size: 1.5rem;
    padding: 0.5rem;
    width: 60%;
    text-align: center;
    text-transform: uppercase;
    border: 2px solid #bdc3c7;
    border-radius: 6px;
    margin-bottom: 1rem;
    outline: none;
  }
  input:focus {
    border-color: #3498db;
  }
  button {
    background-color: #3498db;
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s;
  }
  button:hover {
    background-color: #2980b9;
  }
  button:disabled {
    background-color: #bdc3c7;
    cursor: not-allowed;
  }
  .message {
    margin-top: 1rem;
    font-weight: bold;
    color: #e74c3c;
    min-height: 1.5rem;
  }
  .history {
    margin-top: 1.5rem;
    text-align: left;
    background: #ecf0f1;
    padding: 1rem;
    border-radius: 6px;
    max-height: 120px;
    overflow-y: auto;
  }
  .history p {
    margin: 0 0 0.5rem 0;
    font-family: monospace;
    font-size: 1.1rem;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="game-container">
  <h1>Word Ladder</h1>
  <p>Change exactly <strong>one letter</strong> to make a new English word!</p>

  <div class="current-word" id="currentWordDisplay">WORD</div>

  <input type="text" id="wordInput" maxlength="4" autocomplete="off" placeholder="Type word...">
  <br>
  <button onclick="submitWord()">Submit</button>

  <div class="message" id="message"></div>

  <div class="history" id="history">
    <strong>Path:</strong>
    <p id="wordList">WORD</p>
  </div>
</div>

<script>
  let currentWord = "WORD";
  const historyList = [currentWord];

  const wordInput = document.getElementById('wordInput');
  const currentWordDisplay = document.getElementById('currentWordDisplay');
  const message = document.getElementById('message');
  const wordList = document.getElementById('wordList');
  const submitButton = document.querySelector('button');

  // Allow 'Enter' key submission
  wordInput.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
      submitWord();
    }
  });

  function getLetterDifferences(word1, word2) {
    let diffCount = 0;
    for (let i = 0; i < 4; i++) {
      if (word1[i] !== word2[i]) {
        diffCount++;
      }
    }
    return diffCount;
  }

  async function submitWord() {
    const nextWord = wordInput.value.trim().toUpperCase();
    message.style.color = "#e74c3c"; // Default to error color

    if (nextWord.length !== 4) {
      message.textContent = "Word must be exactly 4 letters.";
      return;
    }

    if (nextWord === currentWord) {
      message.textContent = "You must change at least one letter!";
      return;
    }

    const differences = getLetterDifferences(currentWord, nextWord);
    if (differences !== 1) {
      message.textContent = `You changed ${differences} letters. Change exactly ONE letter!`;
      return;
    }

    // --- Asynchronous API Dictionary Check ---

    // Disable input while fetching to prevent spamming
    wordInput.disabled = true;
    submitButton.disabled = true;
    message.style.color = "#f39c12"; // Orange for loading state
    message.textContent = "Checking dictionary...";

    try {
      // Hit a free dictionary API to validate the word
      const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${nextWord}`);

      if (!response.ok) {
        // A 404 means the word wasn't found in their dictionary
        message.style.color = "#e74c3c";
        message.textContent = `"${nextWord}" is not a recognized English word!`;
        return;
      }

      // If we pass the check, the word exists. Update game state!
      message.style.color = "#27ae60";
      message.textContent = "Nice one!";
      currentWord = nextWord;
      historyList.push(currentWord);

      currentWordDisplay.textContent = currentWord;
      wordList.innerHTML = historyList.join(' &rarr; ');
      wordInput.value = '';

      const historyDiv = document.getElementById('history');
      historyDiv.scrollTop = historyDiv.scrollHeight;

    } catch (error) {
      message.style.color = "#e74c3c";
      message.textContent = "Network error while checking the dictionary.";
    } finally {
      // Re-enable inputs regardless of success or failure
      wordInput.disabled = false;
      submitButton.disabled = false;
      wordInput.focus();
    }
  }
</script>
</body>
</html>
